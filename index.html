<!DOCTYPE html>
<html>
<head>

<title>Aurlets Eid Letters 🌙</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&display=swap" rel="stylesheet">

<style>

body{
background: linear-gradient(#fde2ff,#e0f7ff);
font-family: 'Dancing Script', cursive;
text-align:center;
padding:40px;
}

h1{
font-size:24px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:25px;
margin-top:40px;
}

.envelope{
background:#fff;
border-radius:20px;
padding:25px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.3s;
}

.envelope:hover{
transform:scale(1.08);
}

.passwordBox{
display:none;
margin-top:30px;
}

input{
padding:10px;
border-radius:10px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff9fd6;
cursor:pointer;
}

#scratchContainer{
position:relative;
width:600px;
margin:auto;
margin-top:40px;
}

#letter{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
font-size:26px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
z-index:1;
}

#scratchCanvas{
position:absolute;
top:0;
left:0;
z-index:2;
border-radius:20px;
}

</style>

</head>

<body>

<h1>🌙 Aurlets Eid Letters ✨</h1>
<p>Choose your envelope</p>

<div class="container">

<div class="envelope" onclick="selectPerson('queenz')">💌 Queenz</div>
<div class="envelope" onclick="selectPerson('peanut')">💌 Peanutliver</div>
<div class="envelope" onclick="selectPerson('masab')">💌 Masab</div>
<div class="envelope" onclick="selectPerson('ibbi')">💌 Ibbi</div>
<div class="envelope" onclick="selectPerson('palindrome')">💌 Palindrome</div>
<div class="envelope" onclick="selectPerson('brooks')">💌 Brooks</div>
<div class="envelope" onclick="selectPerson('bipolar')">💌 Bipolar Disorder</div>
<div class="envelope" onclick="selectPerson('maki')">💌 Maki</div>
<div class="envelope" onclick="selectPerson('shino')">💌 Shino & Mustafa</div>
<div class="envelope" onclick="selectPerson('malu')">💌 Malu & Lilly</div>
<div class="envelope" onclick="selectPerson('hajji')">💌 Hajji</div>
<div class="envelope" onclick="selectPerson('allama')">💌 Allama</div>
<div class="envelope" onclick="selectPerson('kole')">💌 Kole</div>
<div class="envelope" onclick="selectPerson('mahi')">💌 Mahi</div>
<div class="envelope" onclick="selectPerson('hala')">💌 Hala</div>
<div class="envelope" onclick="selectPerson('merited')">💌 Merited</div>

</div>

<div class="passwordBox" id="passwordBox">

<p>Enter your Eid code ✨</p>

<input id="passwordInput" placeholder="Enter code">
<button onclick="checkPassword()">Open Envelope</button>

</div>

<div id="scratchContainer">

<canvas id="scratchCanvas" width="600" height="300"></canvas>

<div id="letter"></div>

</div>

<script>

let currentPerson=""

const passwords={
queenz:"4futya",
peanut:"bauni",
masab:"elahi",
ibbi:"nibbi",
palindrome:"brother",
brooks:"urdu teacher",
bipolar:"chaos",
maki:"bacchi",
shino:"duo",
malu:"twins",
hajji:"yaara",
allama:"painter",
kole:"baccha",
mahi:"mahila",
hala:"hakluuu",
merited:"ayan",
}

const letters={

queenz:`Eid Mubarak Queenz 🌙

The past 10 months in Aurlets wouldn't
have been the same without you.

From the chaos to the laughter,
you've been part of the soul of this place.

I'm grateful for every moment
this server gave us.

— Fardin`,

peanut:`Eid Mubarak Peanutliver 🌙

Hey Peanut… ajeeb hai na? Ek online server me na jaan na pehchaan,
aur phir bhi baat karte karte 10 months ho gaye.. Baat baat pe
"mi amore", slapping bot ko abuse karna, uni applications,
essays ko leke tana dena, phir milke essays likhna, VC me gaana gaana,
streams, reels, yaps, bullies… aur finally the uni acceptances!!..

We're growing up so fast… haina?

ik sv me mere alawa bhi you got a lot of peeps to yap with but pata 
hai? mere liye you're the closest one here.. (isi liye kabhi kabhara 
overshare karta hu shayed & now yk a lil too much about me🙄).. 
but yeah that's the reason ye sabse bara wala letter tumhari hai!!

ab asal baat.. ahh yeah, ye sach hai ke ab tumhare sath mere pehle 
jesa utna baatey (ya bakloli) nahi hotey cz ik I've gone through 
these A Levels ka pressure, uni application & all.. bimar bhi rehti 
ho aj kal.. ek karwa sach ye bhi hai ke uni start hone ke baad both 
of us will get busy with our own "real" lives & tab shayad dc pe aana 
bhi dheere dheere chhut jayega... & uske baad ek din shayed aisa bhi 
ayega when we'll become nothing but strangers with a little universe 
of memories left behind somewhere in the virtual world.. 

SO... I just hope ke in mahino me I was able to be a good friend & agey 
ke zindegime tumhari zehn me I'll be able to remain as a lil but positive 
memory.. but HA JO BHI HO, ye yaad rakhna ke thousands of miles away 
from you, someone's actually rooting for your success.. never give up 
on yourself yaar & jab kabhi bhi kisi bhi time agar lage ke ded can 
help me, just remember - I'm only a knock away from you on insta! 

About the UCL thing, scholarship application chal raha hai abhi 
but as yk me, I always expect the least.. & even though I hyped up 
the acceptance a few days ago, agar scholarship na mile toh according 
to the financial condition of my family, studying at the UK is an 
unrealistic dream rn.. south korea chala jaunga bas.. 
waha se spring & autumn foliage ka pic bhejunga tumhe nw :3

soooo.. likhna toh aur bhi boht kuchh tha but I wonder yehi letter
parhogi bhi ya nahi.. anyways!! Allah tumhe sehat, success, & tumhe wo 
sab kuchh de that you want with a good intention.. & HA!!! do keep me 
updated with your life peanut ki bacchi!!.. ekdam se bhul na jana :))

Once again, Eid Mubarak! & Thank you for everything!!

— Fardin`

}

function selectPerson(person){

currentPerson=person
document.getElementById("passwordBox").style.display="block"

}

function checkPassword(){

let input=document.getElementById("passwordInput").value

if(input===passwords[currentPerson]){

startScratch()

}else{

alert("Wrong code 👀")

}

}

function startScratch(){

document.getElementById("scratchCanvas").style.display="block"
document.getElementById("letter").style.display="block"

document.getElementById("letter").innerText=letters[currentPerson]

let canvas=document.getElementById("scratchCanvas")
let ctx=canvas.getContext("2d")

ctx.fillStyle="#bbbbbb"
ctx.fillRect(0,0,600,300)

canvas.addEventListener("mousemove",function(e){

let rect=canvas.getBoundingClientRect()

let x=e.clientX-rect.left
let y=e.clientY-rect.top

ctx.globalCompositeOperation="destination-out"

ctx.beginPath()
ctx.arc(x,y,20,0,Math.PI*2)
ctx.fill()

})

}

</script>

</body>
</html>
